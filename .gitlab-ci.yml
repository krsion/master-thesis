#
# This GitLab CI configuration builds the thesis on each push
# The thesis is stored as an repository artifact
#
# It works with the gitlab.mff.cuni.cz instance.
#

stages:
  - build
  - verify

latexmk:
  stage: build
  image: aergus/latex
  script: |
    apt update && apt install -y rsync && make
  artifacts:
    paths:
      - build/thesis.pdf
      - build/abstract-cz.pdf
      - build/abstract-en.pdf

verapdf:
  stage: verify
  image: ghcr.io/mff-cuni-cz/cuni-thesis-validator
  script: |
    verify build/*.pdf |tee /dev/stderr |grep -qE 'nonCompliant="0" failedJobs="0"'
