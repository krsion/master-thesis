abstract-en: |
  Denicek is a computational substrate for document-oriented end-user programming where users program by recording and replaying edit sequences over tree-structured documents. This thesis evaluates approaches to collaborative editing in Denicek, comparing Conflict-free Replicated Data Types (CRDTs) and Operational Transformation (OT). We evaluate three approaches --- Automerge, Loro, and a custom pure operation-based CRDT --- and describe the trade-offs of each with respect to Denicek's requirements: path-based addressing, wildcards, structural edits, and programming by demonstration. The resulting implementation, called mydenicek, stores edits in a grow-only event graph and obtains documents via a deterministic *eval* function that replays events in topological order. Convergence follows from the pure operation-based CRDT framework (G-Set state + deterministic eval); the main engineering contribution is intention preservation --- ensuring that references survive structural edits, wildcards expand over concurrent inserts, and recorded edit sequences replay correctly after schema evolution. The implementation is validated on five formative examples including a counter, a conference speaker list, and list-to-table refactoring with concurrent edits from multiple peers.
abstract-cs: |
  Denicek je výpočetní substrát pro *document-oriented end-user programming*, ve kterém uživatelé programují nahráváním a replayováním editačních sekvencí nad stromově strukturovanými dokumenty. Tato práce evaluuje přístupy ke kolaborativní editaci v systému Denicek, porovnávající *Conflict-free Replicated Data Types* (CRDT) a *Operational Transformation* (OT). Hodnotíme tři přístupy --- Automerge, Loro a vlastní *pure operation-based* CRDT --- a popisujeme *trade-offs* každého z nich s ohledem na požadavky systému Denicek: adresování cestou, zástupné znaky, strukturální editace a *programming by demonstration*. Výsledná implementace mydenicek ukládá editace v rostoucím grafu událostí a dokument získává deterministickou *eval* funkcí, která přehraje události v topologickém pořadí. Konvergence plyne z rámce *pure operation-based* CRDT (G-Set stav + deterministická eval); hlavním inženýrským přínosem je *intention preservation* --- zajištění, že reference přežijí strukturální editace, zástupné znaky se rozšíří na konkurentní inserty a nahrané editační sekvence fungují po změně schématu. Implementace je validována na pěti formativních příkladech včetně čítače, seznamu konferenčních řečníků a refaktorizace seznamu na tabulku s konkurentními editacemi více peerů.

