abstract-en: |
  Denicek is a computational substrate for document-oriented end-user programming where users program by recording and replaying edit sequences over tree-structured documents. This thesis evaluates approaches to collaborative editing in Denicek, comparing Conflict-free Replicated Data Types (CRDTs) and Operational Transformation (OT). We evaluate three approaches --- Automerge, Loro, and a custom event-sourced CRDT whose design is inspired by Eg-walker --- and describe the trade-offs of each with respect to Denicek's requirements: path-based addressing, wildcards, structural edits, and programming by demonstration. The resulting implementation, called mydenicek, is a pure operation-based CRDT whose state is a grow-only graph of edit events and whose document is obtained by a deterministic pure view function that rewrites concurrent selectors through structural edits during a canonical topological replay. This reframing gives a short proof of strong eventual consistency without relying on the classical OT transformation properties TP1 and TP2. The implementation is validated on seven formative examples including a counter, a conference speaker list, list-to-table refactoring with concurrent edits from multiple peers, and a todo app with multi-step macro recording.
abstract-cs: |
  Denicek je výpočetní substrát pro *document-oriented end-user programming*, ve kterém uživatelé programují nahráváním a replayováním editačních sekvencí nad stromově strukturovanými dokumenty. Tato práce evaluuje přístupy ke kolaborativní editaci v systému Denicek, porovnávající *Conflict-free Replicated Data Types* (CRDT) a *Operational Transformation* (OT). Hodnotíme tři přístupy --- Automerge, Loro a vlastní návrh založený na *event-sourced* grafu s transformacemi selektorů, inspirovaný Eg-walkerem --- a popisujeme *trade-offs* každého z nich s ohledem na požadavky systému Denicek: adresování cestou, zástupné znaky, strukturální editace a *programming by demonstration*. Výsledná implementace mydenicek je *pure operation-based* CRDT, jehož stavem je rostoucí graf editačních událostí a jehož dokument se získává deterministickou čistou *view function* pomocí kanonického topologického přehrání s přepisem selektorů. Tento pohled dává krátký důkaz silné eventuální konzistence bez nutnosti klasických OT vlastností TP1 a TP2. Implementace je validována na sedmi formativních příkladech včetně čítače, seznamu konferenčních řečníků, refaktorizace seznamu na tabulku s konkurentními editacemi více peerů a aplikace todo s vícekrokovým nahráváním maker.

