abstract-en: |
  Denicek is a computational substrate for document-oriented end-user programming where users program by recording and replaying edit sequences over tree-structured documents. The original implementation uses Operational Transformation (OT) for collaborative editing, which is error-prone and difficult to extend. This thesis investigates the use of Conflict-free Replicated Data Types (CRDTs) to enable more robust collaborative editing in Denicek. We evaluate three approaches --- Automerge, Loro, and a custom OT-based event DAG inspired by Eg-walker --- and describe the trade-offs of each with respect to Denicek's requirements: path-based addressing, wildcards, structural edits, and programming by demonstration. The result is a new implementation of the Denicek core that stores edits in a causal event graph with vector clocks and uses deterministic topological replay with selector-based operational transformation to achieve convergence. The implementation is validated on six formative examples including a counter, conference speaker list, and list-to-table refactoring with concurrent edits from multiple peers.
abstract-cs: |
  Denicek je výpočetní substrát pro document-oriented end-user programming, ve kterém uživatelé programují nahráváním a replayováním editačních sekvencí nad stromově strukturovanými dokumenty. Současná implementace využívá Operational Transformation (OT) pro kolaborativní editaci, která je error-prone a obtížně rozšiřitelná. Tato práce zkoumá využití Conflict-free Replicated Data Types (CRDT) pro robustnější kolaborativní editaci v systému Denicek. Hodnotíme tři přístupy --- Automerge, Loro a vlastní OT-based event DAG inspirovaný Eg-walkerem --- a popisujeme trade-offs každého z nich s ohledem na požadavky systému Denicek: path-based addressing, wildcards, strukturální editace a programming by demonstration. Výsledkem je nová implementace core systému Denicek, která ukládá editace do kauzálního event grafu s vector clocks a používá deterministický topologický replay se selector-based OT pro dosažení konvergence. Implementace je validována na šesti formativních příkladech včetně counteru, seznamu konferenčních řečníků a refaktorizace seznamu na tabulku s konkurentními editacemi více peerů.

