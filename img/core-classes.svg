<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="400" viewBox="0 0 520 400">
  <style>
    text { font-family: monospace; font-size: 11px; fill: #333; }
    .name { font-size: 12px; font-weight: bold; }
    .field { font-size: 10px; }
    .note { font-size: 9px; fill: #888; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="dia" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="5 0, 10 5, 5 10, 0 5" fill="#666"/>
    </marker>
  </defs>

  <!-- Denicek -->
  <rect x="170" y="10" width="180" height="65" rx="5" fill="#e8f0fe" stroke="#0078d4" stroke-width="1.5"/>
  <text x="260" y="28" class="name" text-anchor="middle" fill="#0078d4">Denicek</text>
  <line x1="170" y1="34" x2="350" y2="34" stroke="#0078d4" stroke-opacity="0.3"/>
  <text x="180" y="48" class="field">peerId: string</text>
  <text x="180" y="60" class="field">add(), rename(), wrapRecord()...</text>
  <text x="180" y="72" class="field">undo(), redo(), replay()</text>

  <!-- EventGraph -->
  <rect x="10" y="120" width="200" height="75" rx="5" fill="#fff4e5" stroke="#f5a623" stroke-width="1.5"/>
  <text x="110" y="138" class="name" text-anchor="middle" fill="#f5a623">EventGraph</text>
  <line x1="10" y1="144" x2="210" y2="144" stroke="#f5a623" stroke-opacity="0.3"/>
  <text x="20" y="158" class="field">events: Map&lt;string, Event&gt;</text>
  <text x="20" y="170" class="field">frontiers: EventId[]</text>
  <text x="20" y="182" class="field">materialize(), ingestEvents()</text>
  <text x="20" y="192" class="field">resolveReplayEdit()</text>

  <!-- Event -->
  <rect x="310" y="120" width="200" height="70" rx="5" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="410" y="138" class="name" text-anchor="middle" fill="#8b5cf6">Event</text>
  <line x1="310" y1="144" x2="510" y2="144" stroke="#8b5cf6" stroke-opacity="0.3"/>
  <text x="320" y="158" class="field">id: EventId</text>
  <text x="320" y="170" class="field">parents: EventId[]</text>
  <text x="320" y="182" class="field">clock: VectorClock</text>
  <text x="420" y="158" class="field">edit: Edit</text>
  <text x="420" y="170" class="field note">resolveAgainst()</text>

  <!-- Edit -->
  <rect x="310" y="240" width="200" height="60" rx="5" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="410" y="258" class="name" text-anchor="middle" fill="#ea4335">Edit (abstract)</text>
  <line x1="310" y1="264" x2="510" y2="264" stroke="#ea4335" stroke-opacity="0.3"/>
  <text x="320" y="278" class="field">target: Selector</text>
  <text x="320" y="290" class="field">apply(), transform()</text>
  <text x="420" y="278" class="field">transformSelector()</text>
  <text x="420" y="290" class="field">computeInverse()</text>

  <!-- Node -->
  <rect x="10" y="240" width="200" height="65" rx="5" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="110" y="258" class="name" text-anchor="middle" fill="#34a853">Node (abstract)</text>
  <line x1="10" y1="264" x2="210" y2="264" stroke="#34a853" stroke-opacity="0.3"/>
  <text x="20" y="278" class="field">navigate(selector): Node[]</text>
  <text x="20" y="290" class="field">clone(), toPlain()</text>
  <text x="20" y="302" class="field note">Record | List | Primitive | Ref</text>

  <!-- Selector + VectorClock -->
  <rect x="120" y="345" width="120" height="30" rx="5" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="180" y="365" class="name" text-anchor="middle">Selector</text>

  <rect x="280" y="345" width="120" height="30" rx="5" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="340" y="365" class="name" text-anchor="middle">VectorClock</text>

  <!-- Relationships -->
  <!-- Denicek → EventGraph (owns) -->
  <line x1="220" y1="75" x2="130" y2="117" stroke="#666" stroke-width="1.5" marker-end="url(#dia)"/>
  <text x="145" y="95" class="note">owns</text>

  <!-- EventGraph → Event (contains many) -->
  <line x1="210" y1="150" x2="307" y2="150" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="250" y="143" class="note">contains *</text>

  <!-- Event → Edit (has one) -->
  <line x1="410" y1="190" x2="410" y2="237" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="418" y="218" class="note">has 1</text>

  <!-- Edit → Node (targets) -->
  <line x1="310" y1="270" x2="213" y2="270" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="263" class="note">applies to</text>

  <!-- EventGraph → Node (initial doc) -->
  <line x1="110" y1="195" x2="110" y2="237" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="118" y="220" class="note">initial doc</text>

  <!-- Edit → Selector -->
  <line x1="350" y1="300" x2="220" y2="345" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Event → VectorClock -->
  <line x1="410" y1="190" x2="360" y2="342" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
</svg>
